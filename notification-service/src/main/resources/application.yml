spring:
  application:
    name: notification-service

server:
  port: 8083

logging:
  level:
    root: INFO
    com.cobre.notificationservice: DEBUG
    org.springframework: WARN
    org.springframework.boot.autoconfigure: ERROR

  file:
    name: logs/notification-service.log

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %level [%thread] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} - %level [%thread] %logger{36} - %msg%n"

aws:
  region: us-east-1
  credentials:
    access-key: test
    secret-key: test
  sqs:
    queue-name: payment-notifications
    queue-url: http://localhost:4566/000000000000/payment-notifications
  dynamodb:
    endpoint: http://localhost:4566
    table-name: Notifications
